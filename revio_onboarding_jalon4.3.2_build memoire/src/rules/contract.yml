schema: contract
version: 2
description: Règles de mapping Contract — source de vérité pour le moteur. Généré
  depuis spec_contract_v2.xlsx via gen_yaml.py. Clé primaire = (plate, number).
primary_key:
- plate
- number
fields:
  plate:
    mandatory: true
    type: string
    description: Plaque d'immatriculation du véhicule rattaché au contrat.
    notes: 'Format FR attendu AB-123-CD après normalisation. Source EXCLUSIVE : fichier
      client.'
    rules:
    - priority: 1
      source: client_file
      source_label: client_file
      transform: normalize_plate
      column: Plaque / Immatriculation
      note: SOURCE EXCLUSIVE. Master list des plaques.
    - priority: 99
      source: arval_aen
      source_label: arval_aen
      transform: cross_check
      column: Immat
      note: idem
    - priority: 99
      source: arval_and
      source_label: arval_and
      transform: cross_check
      column: IMMAT
      note: idem
    - priority: 99
      source: arval_facture_pdf
      source_label: arval_facture_pdf
      transform: cross_check
      column: 'Ligne contrat : ''N° XXX - [PLAQUE] - …'''
      note: idem
    - priority: 99
      source: arval_uat
      source_label: arval_uat
      transform: cross_check
      column: Plaque d'immatriculation
      note: idem
    - priority: 99
      source: autre_loueur_ep
      source_label: autre_loueur_ep
      transform: cross_check
      column: Immatriculation / Plaque / N° Immat
      note: idem
    - priority: 99
      source: autre_loueur_facture_pdf
      source_label: autre_loueur_facture_pdf
      transform: cross_check
      column: Ligne contrat (regex générique)
      note: idem
    - priority: 99
      source: ayvens_aen
      source_label: ayvens_aen
      transform: cross_check
      column: Immatriculation
      note: idem
    - priority: 99
      source: ayvens_etat_parc
      source_label: ayvens_etat_parc
      transform: cross_check
      column: N° Immat
      note: Cross-check uniquement. Si plaque absente du client_file → fichier d'erreurs.
    - priority: 99
      source: ayvens_facture_pdf
      source_label: ayvens_facture_pdf
      transform: cross_check
      column: 'Ligne contrat : ''N° XXX - [PLAQUE] - …'''
      note: idem — parsing regex
    - priority: 99
      source: ayvens_pneus
      source_label: ayvens_pneus
      transform: cross_check
      column: Immatriculation
      note: idem
  plateCountry:
    mandatory: true
    type: string
    description: Code ISO pays d'immatriculation.
    notes: FR par défaut
    rules:
    - priority: 1
      source: '*'
      source_label: '*'
      transform: const_FR
      column: (constante)
      note: Hardcodé FR tant qu'on n'a pas de clients étrangers
  partnerId:
    mandatory: true
    type: uuid
    description: UUID du loueur (ou prestataire) chez Revio — résolu par l'Index partnerId.
    notes: Index à remplir par onglet Index partnerId
    rules:
    - priority: 1
      source: backoffice
      source_label: backoffice
      transform: lookup_by_source_slug
      column: Index partnerId (source → UUID)
      note: 'Source slug → UUID via Index partnerId. Ex: ayvens_* → UUID Ayvens ;
        autre_loueur_* → UUID saisi à l''upload.'
  number:
    mandatory: true
    type: string
    description: Numéro de contrat chez le loueur.
    notes: Ex. TX43813 (Ayvens), 2141682 (Arval)
    rules:
    - priority: 1
      source: arval_uat
      source_label: arval_uat
      transform: strip
      column: Numéro de contrat
    - priority: 1
      source: autre_loueur_ep
      source_label: autre_loueur_ep
      transform: strip
      column: N° Contrat / Numéro contrat
    - priority: 1
      source: ayvens_etat_parc
      source_label: ayvens_etat_parc
      transform: strip
      column: N° Contrat
    - priority: 2
      source: arval_facture_pdf
      source_label: arval_facture_pdf
      transform: regex_number
      column: 'Ligne contrat : ''Contrat N° XXX - …'''
      note: idem
    - priority: 2
      source: autre_loueur_facture_pdf
      source_label: autre_loueur_facture_pdf
      transform: regex_number
      column: Ligne contrat (regex)
      note: idem
    - priority: 2
      source: ayvens_facture_pdf
      source_label: ayvens_facture_pdf
      transform: regex_number
      column: 'Ligne contrat : ''Contrat N° XXX - …'''
      note: 'Regex : r''Contrat N°\s*(\d+)'''
    - priority: 3
      source: client_file
      source_label: client_file
      transform: strip
      column: Numéro contrat / référence
      note: Fallback
  isHT:
    mandatory: true
    type: bool
    description: Le contrat est-il exprimé Hors Taxes ?
    enum: TRUE / FALSE
    notes: 'Règle : VP → FALSE (TTC) ; non-VP → TRUE (HT). VP lu en PRIORITÉ dans
      le fichier EP où on trouve le prix ; fallback API_Plaque si absent. Conflit
      EP vs API_Plaque → NON logué Contract (déjà dans erreurs Vehicle).'
    rules:
    - priority: 1
      source: ep_loueur
      source_label: ep_loueur
      transform: rule_isHT_from_VP_EP
      column: Indication VP / non-VP du fichier EP utilisé
      note: 'Priorité : VP lu dans l''EP où on trouve le prix. Si manquant → fallback
        API_Plaque.'
    - priority: 2
      source: api_plaque
      source_label: api_plaque
      transform: rule_isHT_from_VP_API
      column: Classification VP via API plaques (Vehicles)
      note: Fallback si EP n'a pas l'info. Conflit EP↔API_Plaque NON logué Contract
        (traité dans erreurs Vehicle).
  durationMonths:
    mandatory: true
    type: int
    description: Durée totale du contrat en mois.
    notes: EP P1, facture P2, client_file P3, sinon dérivé de (endDate - startDate)
    rules:
    - priority: 1
      source: arval_uat
      source_label: arval_uat
      transform: int
      column: Durée de contrat
      note: En mois
    - priority: 1
      source: autre_loueur_ep
      source_label: autre_loueur_ep
      transform: int
      column: Durée contrat / Durée (M)
      note: En mois
    - priority: 1
      source: ayvens_etat_parc
      source_label: ayvens_etat_parc
      transform: int
      column: Durée contrat
      note: En mois. Source de vérité si renseigné.
    - priority: 2
      source: arval_facture_pdf
      source_label: arval_facture_pdf
      transform: regex_duration
      column: 'Ligne contrat : ''60M/200000 Km'''
      note: idem
    - priority: 2
      source: autre_loueur_facture_pdf
      source_label: autre_loueur_facture_pdf
      transform: regex_duration
      column: Ligne contrat (regex)
      note: idem
    - priority: 2
      source: ayvens_facture_pdf
      source_label: ayvens_facture_pdf
      transform: regex_duration
      column: 'Ligne contrat : ''60M/200000 Km'''
      note: 'Regex : r''(\d+)M/'''
    - priority: 3
      source: client_file
      source_label: client_file
      transform: int
      column: Durée contrat (mois)
    - priority: 4
      source: derived
      source_label: (dérivé)
      transform: compute_months
      column: endDate - startDate
      note: Fallback ultime si rien trouvé
  startDate:
    mandatory: true
    type: date
    description: Date de début de contrat.
    notes: Format cible YYYY/MM/DD ; sources en DD/MM/YYYY ou ISO
    rules:
    - priority: 1
      source: arval_uat
      source_label: arval_uat
      transform: date_iso
      column: DATE DE DEBUT DE CONTRAT
      note: ISO déjà
    - priority: 1
      source: autre_loueur_ep
      source_label: autre_loueur_ep
      transform: date_any_to_iso
      column: Date début contrat
    - priority: 1
      source: ayvens_etat_parc
      source_label: ayvens_etat_parc
      transform: date_fr_to_iso
      column: Date début contrat
      note: DD/MM/YYYY → YYYY/MM/DD
    - priority: 2
      source: arval_facture_pdf
      source_label: arval_facture_pdf
      transform: regex_start_date
      column: Ligne 'Du DD/MM/YYYY au DD/MM/YYYY'
      note: idem
    - priority: 2
      source: autre_loueur_facture_pdf
      source_label: autre_loueur_facture_pdf
      transform: regex_start_date
      column: Ligne période (regex)
      note: idem
    - priority: 2
      source: ayvens_facture_pdf
      source_label: ayvens_facture_pdf
      transform: regex_start_date
      column: Ligne 'Du DD/MM/YYYY au DD/MM/YYYY'
      note: Dans l'annexe, sous chaque contrat
    - priority: 3
      source: client_file
      source_label: client_file
      transform: date_any_to_iso
      column: Date début contrat
  endDate:
    mandatory: true
    type: date
    description: Date de fin de contrat.
    notes: idem
    rules:
    - priority: 1
      source: arval_uat
      source_label: arval_uat
      transform: date_iso
      column: DATE DE FIN DE CONTRAT
    - priority: 1
      source: autre_loueur_ep
      source_label: autre_loueur_ep
      transform: date_any_to_iso
      column: Date fin contrat
    - priority: 1
      source: ayvens_etat_parc
      source_label: ayvens_etat_parc
      transform: date_fr_to_iso
      column: Date fin contrat
    - priority: 2
      source: arval_facture_pdf
      source_label: arval_facture_pdf
      transform: regex_restit_date
      column: '''Date de restit. prévue : DD/MM/YYYY'''
      note: idem
    - priority: 2
      source: autre_loueur_facture_pdf
      source_label: autre_loueur_facture_pdf
      transform: regex_restit_date
      column: Date restit. (regex)
      note: idem
    - priority: 2
      source: ayvens_facture_pdf
      source_label: ayvens_facture_pdf
      transform: regex_restit_date
      column: '''Date de restit. prévue : DD/MM/YYYY'''
      note: 'Regex : r''Date de restit\. prévue\s*:\s*(\d{2}/\d{2}/\d{4})'''
    - priority: 3
      source: client_file
      source_label: client_file
      transform: date_any_to_iso
      column: Date fin contrat
  contractedMileage:
    mandatory: false
    type: int
    description: Kilométrage contractuel total.
    notes: Ex. 120000
    rules:
    - priority: 1
      source: arval_uat
      source_label: arval_uat
      transform: int
      column: Kilométrage
    - priority: 1
      source: autre_loueur_ep
      source_label: autre_loueur_ep
      transform: int
      column: Km contrat / Kilométrage
    - priority: 1
      source: ayvens_etat_parc
      source_label: ayvens_etat_parc
      transform: int
      column: Km contrat
    - priority: 2
      source: arval_facture_pdf
      source_label: arval_facture_pdf
      transform: regex_mileage
      column: Ligne contrat
      note: idem
    - priority: 2
      source: autre_loueur_facture_pdf
      source_label: autre_loueur_facture_pdf
      transform: regex_mileage
      column: Ligne contrat
      note: idem
    - priority: 2
      source: ayvens_facture_pdf
      source_label: ayvens_facture_pdf
      transform: regex_mileage
      column: 'Ligne contrat : ''60M/200000 Km'''
      note: 'Regex : r''\d+M/(\d+)\s*Km'''
    - priority: 3
      source: client_file
      source_label: client_file
      transform: int
      column: Km contractuel
  maxMileage:
    mandatory: false
    type: int
    description: Kilométrage maximum techniquement autorisé.
    notes: 'Ayvens EP: KM tech Max (seul loueur à donner cette info)'
    rules:
    - priority: 1
      source: autre_loueur_ep
      source_label: autre_loueur_ep
      transform: int
      column: KM tech Max / Km max
    - priority: 1
      source: ayvens_etat_parc
      source_label: ayvens_etat_parc
      transform: int
      column: KM tech Max
      note: Ex. 180000 — souvent ~1.5× km contrat
    - priority: 2
      source: client_file
      source_label: client_file
      transform: int
      column: Km max technique
      note: Arval UAT et factures ne donnent pas cette info
  extraKmPrice:
    mandatory: false
    type: float
    description: Prix unitaire du km additionnel en fin de contrat.
    notes: Client_file en priorité
    rules:
    - priority: 1
      source: client_file
      source_label: client_file
      transform: float_fr
      column: Prix km supplémentaire
      note: Aucune source loueur fiable
  vehicleValue:
    mandatory: false
    type: float
    description: Prix du véhicule (obligatoire pour VP).
    notes: Prix net remisé uniquement. JAMAIS 'Prix catalogue' ni 'Prix Véhicule TTC
      brut'.
    rules:
    - priority: 0
      source: arval_aen
      source_label: arval_aen
      transform: passthrough
      column: Prix Véhicule TTC (NE JAMAIS PRENDRE)
      banned: true
      note: Valeur brute, pas la remise
    - priority: 0
      source: ayvens_aen
      source_label: ayvens_aen
      transform: passthrough
      column: Prix catalogue (NE JAMAIS PRENDRE)
      banned: true
      note: Valeur catalogue brut, pas remisée
    - priority: 1
      source: arval_and
      source_label: arval_and
      transform: float_fr
      column: Prix remisé TTC dont montant batterie TTC
      note: Prendre toujours net remisé
    - priority: 1
      source: autre_loueur_and
      source_label: autre_loueur_and
      transform: float_fr
      column: Prix remisé TTC
      note: Prendre toujours net remisé
    - priority: 1
      source: ayvens_aen
      source_label: ayvens_aen
      transform: float_fr
      column: Prix achat net TTC
      note: Ex. 27132,31 — valeur NET remisée
    - priority: 2
      source: autre_loueur_aen
      source_label: autre_loueur_aen
      transform: float_fr
      column: Prix achat net TTC / Prix véhicule TTC
      note: Prendre toujours la valeur net remisée
    - priority: 3
      source: client_file
      source_label: client_file
      transform: float_fr
      column: Prix véhicule
  batteryValue:
    mandatory: false
    type: float
    description: Valeur de la batterie pour VE.
    notes: VE uniquement — déclenché via motorisation côté Vehicles. Dans tous les
      AND (colonne à identifier).
    rules:
    - priority: 1
      source: arval_and
      source_label: arval_and
      transform: float_fr
      column: Montant de la batterie TTC
      note: VE uniquement. Déclenché via motorisation côté Vehicles (Q8 ✓).
    - priority: 1
      source: autre_loueur_and
      source_label: autre_loueur_and
      transform: float_fr
      column: Montant batterie TTC (ou équivalent)
      note: idem pour tout autre loueur
    - priority: 1
      source: ayvens_and
      source_label: ayvens_and
      transform: float_fr
      column: (colonne à identifier sur import VE)
      note: 'Augustin confirme : l''info est quelque part, à localiser dès qu''un
        VE sera présent dans un import Ayvens.'
    - priority: 2
      source: client_file
      source_label: client_file
      transform: float_fr
      column: Valeur batterie
  civilLiabilityPrice:
    mandatory: false
    type: float
    description: Prix mensuel RC.
    notes: client_file P1, facture (rubrique RC) P2
    rules:
    - priority: 1
      source: client_file
      source_label: client_file
      transform: float_fr
      column: Prix RC mensuel
    - priority: 2
      source: arval_facture_pdf
      source_label: arval_facture_pdf
      transform: float_fr_rubrique
      column: Rubrique regex 'responsabilité civile|\bRC\b'
    - priority: 2
      source: autre_loueur_facture_pdf
      source_label: autre_loueur_facture_pdf
      transform: float_fr_rubrique
      column: Rubrique regex 'responsabilité civile|\bRC\b'
    - priority: 2
      source: ayvens_facture_pdf
      source_label: ayvens_facture_pdf
      transform: float_fr_rubrique
      column: Rubrique regex 'responsabilité civile|\bRC\b'
      note: Whitelist
  legalProtectionPrice:
    mandatory: false
    type: float
    description: Prix mensuel protection juridique.
    notes: client_file P1, facture P2
    rules:
    - priority: 1
      source: client_file
      source_label: client_file
      transform: float_fr
      column: Prix protection juridique
    - priority: 2
      source: arval_facture_pdf
      source_label: arval_facture_pdf
      transform: float_fr_rubrique
      column: Rubrique 'protection juridique'
    - priority: 2
      source: autre_loueur_facture_pdf
      source_label: autre_loueur_facture_pdf
      transform: float_fr_rubrique
      column: Rubrique 'protection juridique'
    - priority: 2
      source: ayvens_facture_pdf
      source_label: ayvens_facture_pdf
      transform: float_fr_rubrique
      column: Rubrique 'protection juridique'
  theftFireAndGlassPrice:
    mandatory: false
    type: float
    description: Prix mensuel vol / incendie / bris de glace.
    notes: client_file P1, facture P2
    rules:
    - priority: 1
      source: client_file
      source_label: client_file
      transform: float_fr
      column: Prix vol/incendie/bris
    - priority: 2
      source: arval_facture_pdf
      source_label: arval_facture_pdf
      transform: float_fr_rubrique
      column: idem
    - priority: 2
      source: autre_loueur_facture_pdf
      source_label: autre_loueur_facture_pdf
      transform: float_fr_rubrique
      column: idem
    - priority: 2
      source: ayvens_facture_pdf
      source_label: ayvens_facture_pdf
      transform: float_fr_rubrique
      column: Rubrique 'bris de glace|vol|incendie'
  allRisksPrice:
    mandatory: false
    type: float
    description: Prix mensuel tous risques.
    notes: client_file P1, facture (Assurance Auto Multirisques) P2
    rules:
    - priority: 1
      source: client_file
      source_label: client_file
      transform: float_fr
      column: Prix tous risques
    - priority: 2
      source: arval_facture_pdf
      source_label: arval_facture_pdf
      transform: float_fr_rubrique
      column: Rubrique 'Assurance Auto Multirisques'
      note: Ex. 47.00 H.C.
    - priority: 2
      source: autre_loueur_facture_pdf
      source_label: autre_loueur_facture_pdf
      transform: float_fr_rubrique
      column: Rubrique 'tous risques|multirisques'
    - priority: 2
      source: ayvens_facture_pdf
      source_label: ayvens_facture_pdf
      transform: float_fr_rubrique
      column: Rubrique 'tous risques|multirisques|dommages'
  financialLossPrice:
    mandatory: false
    type: float
    description: Prix mensuel perte financière.
    notes: client_file P1, facture P2
    rules:
    - priority: 1
      source: client_file
      source_label: client_file
      transform: float_fr
      column: Prix perte financière
    - priority: 2
      source: arval_facture_pdf
      source_label: arval_facture_pdf
      transform: float_fr_rubrique
      column: Rubrique 'perte financière'
    - priority: 2
      source: autre_loueur_facture_pdf
      source_label: autre_loueur_facture_pdf
      transform: float_fr_rubrique
      column: Rubrique 'perte financière'
    - priority: 2
      source: ayvens_facture_pdf
      source_label: ayvens_facture_pdf
      transform: float_fr_rubrique
      column: Rubrique 'perte financière'
  maintenancePrice:
    mandatory: false
    type: float
    description: Prix mensuel entretien.
    notes: client_file P1, facture P2
    rules:
    - priority: 1
      source: client_file
      source_label: client_file
      transform: float_fr
      column: Prix entretien mensuel
    - priority: 2
      source: arval_facture_pdf
      source_label: arval_facture_pdf
      transform: float_fr_rubrique
      column: Rubrique 'entretien|maintenance'
    - priority: 2
      source: autre_loueur_facture_pdf
      source_label: autre_loueur_facture_pdf
      transform: float_fr_rubrique
      column: Rubrique 'entretien|maintenance'
    - priority: 2
      source: ayvens_facture_pdf
      source_label: ayvens_facture_pdf
      transform: float_fr_rubrique
      column: Rubrique 'entretien|maintenance'
      note: Hors 'aucune prestation'
  replacementVehiclePrice:
    mandatory: false
    type: float
    description: Prix mensuel véhicule de remplacement.
    notes: client_file P1, facture P2
    rules:
    - priority: 1
      source: client_file
      source_label: client_file
      transform: float_fr
      column: Prix VR mensuel
    - priority: 2
      source: arval_facture_pdf
      source_label: arval_facture_pdf
      transform: float_fr_rubrique
      column: idem
    - priority: 2
      source: autre_loueur_facture_pdf
      source_label: autre_loueur_facture_pdf
      transform: float_fr_rubrique
      column: idem
    - priority: 2
      source: ayvens_facture_pdf
      source_label: ayvens_facture_pdf
      transform: float_fr_rubrique
      column: Rubrique 'véhicule de remplacement|VR'
  tiresPrice:
    mandatory: false
    type: float
    description: Prix mensuel pneus.
    notes: client_file P1, facture P2 (hors avenants exceptionnels)
    rules:
    - priority: 1
      source: client_file
      source_label: client_file
      transform: float_fr
      column: Prix pneus mensuel
    - priority: 2
      source: arval_facture_pdf
      source_label: arval_facture_pdf
      transform: float_fr_rubrique
      column: idem
    - priority: 2
      source: autre_loueur_facture_pdf
      source_label: autre_loueur_facture_pdf
      transform: float_fr_rubrique
      column: idem
    - priority: 2
      source: ayvens_facture_pdf
      source_label: ayvens_facture_pdf
      transform: float_fr_rubrique
      column: Rubrique 'pneu|pneumatique'
      note: Hors 'hors avenant' / 'crevaison'
  gasCardPrice:
    mandatory: false
    type: float
    description: Prix mensuel carte carburant (redevance, pas la conso).
    notes: facture P1 'Redevance carte carburant' (EXCLURE 'Charges carburant' = conso)
    rules:
    - priority: 1
      source: arval_facture_pdf
      source_label: arval_facture_pdf
      transform: float_fr_rubrique
      column: idem
    - priority: 1
      source: autre_loueur_facture_pdf
      source_label: autre_loueur_facture_pdf
      transform: float_fr_rubrique
      column: idem
    - priority: 1
      source: ayvens_facture_pdf
      source_label: ayvens_facture_pdf
      transform: float_fr_rubrique
      column: Rubrique 'carte carburant|redevance carburant'
      note: EXCLURE 'charges carburant' = conso
    - priority: 2
      source: client_file
      source_label: client_file
      transform: float_fr
      column: Prix carte carburant mensuel
  tollCardPrice:
    mandatory: false
    type: float
    description: Prix mensuel télébadge (redevance, pas les péages consommés).
    notes: facture P1 (EXCLURE 'Péage consommé')
    rules:
    - priority: 1
      source: arval_facture_pdf
      source_label: arval_facture_pdf
      transform: float_fr_rubrique
      column: idem
    - priority: 1
      source: autre_loueur_facture_pdf
      source_label: autre_loueur_facture_pdf
      transform: float_fr_rubrique
      column: idem
    - priority: 1
      source: ayvens_facture_pdf
      source_label: ayvens_facture_pdf
      transform: float_fr_rubrique
      column: Rubrique 'télébadge|télépéage|redevance péage'
      note: EXCLURE 'péage consommé'
    - priority: 2
      source: client_file
      source_label: client_file
      transform: float_fr
      column: Prix télébadge mensuel
  totalPrice:
