# Patterns de détection appris — complétés manuellement après classification
# d'un format inconnu. Voir src/learned_patterns.py pour le format attendu.
#
# Chaque entrée représente la signature d'un format de fichier (nom + colonnes
# caractéristiques) et indique à quel slug YAML le rattacher.
#
# Exemple :
#   patterns:
#     - id: "alphabet_etat_parc"
#       slug: "autre_loueur_etat_parc"
#       loueur_hint: "Alphabet"
#       match:
#         filename_regex: "(?i).*alphabet.*etat.*parc.*"
#         columns_include: ["Immatriculation", "VIN"]
#       created_at: "2026-04-21"
#       created_by: "augustin@gorevio.co"
patterns:
- id: agilauto_etat_de_parc
  slug: autre_loueur_etat_parc
  match:
    filename_regex: (?i).*agilauto\ \-\ etat\ de\ parc.*
    columns_include:
    - Première mise en circulation
    - Puissance fiscale
  column_mapping:
    registrationPlate: Immat..1
    parcEntryAt: Date de début
    registrationIssueCountryCode: Pays
    brand: Marque
    model: Modèle
    motorisation: Énergie
    co2gKm: Émissions de CO2
    registrationIssueDate: Première mise en circulation
    registrationVin: Numéro de série
    registrationFiscalPower: Puissance fiscale
    usage: Genre fiscal
  created_at: '2026-04-30'
